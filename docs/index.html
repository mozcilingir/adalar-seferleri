<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⛴️ Adalar Vapur Seferleri</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3f6fa; --surface:#ffffff; --surface2:#eef2f7;
  --border:#d4dce8; --border2:#bfcada;
  --text:#1a2535; --text2:#3d4f65; --muted:#7a8fa8;
  --blue:#0068b5; --blue-bg:#e8f2fb; --blue-border:#b5d0ec;
  --teal:#007878; --gold:#8a5e00;
  --green:#1a7a3a; --green-bg:#e6f5ed; --green-border:#9dd4b5;
  --pink:#9a1f5e; --pink-bg:#fce8f3; --pink-border:#e8a8cc;
  --purple:#4f38a0; --purple-bg:#ede8f9; --purple-border:#c0b0e8;
  --orange:#9e3f00; --orange-bg:#fef0e6; --orange-border:#e8b898;
  --red:#b01a1a;
  --sh: 0 1px 3px rgba(0,0,0,.07), 0 1px 8px rgba(0,0,0,.05);
  --sh2: 0 2px 12px rgba(0,0,0,.10);
  --label-w:104px; --row-h:44px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;gap:10px;}
.ferry{font-size:1.75rem;animation:bob 3.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.hdr h1{font-family:'Syne',sans-serif;font-size:1.18rem;font-weight:800;color:var(--text);}
.hdr p{font-size:.62rem;color:var(--muted);margin-top:2px;}
.src-pill{margin-left:auto;font-size:.55rem;font-weight:600;padding:3px 8px;border-radius:100px;
  background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);white-space:nowrap;align-self:start;margin-top:2px;}

/* CLOCK */
.clk{margin:12px 16px 0;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);}
.clk-time{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;color:var(--gold);letter-spacing:2px;}
.clk-date{font-size:.7rem;color:var(--text2);}
.badge{display:inline-block;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:100px;
  margin-top:3px;border:1px solid;}
.badge.hic{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}
.badge.paz{background:var(--pink-bg);color:var(--pink);border-color:var(--pink-border);}

/* ADA SEÇİCİ */
.ada-wrap{margin:12px 16px 0;}
.lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;color:var(--muted);margin-bottom:6px;}
.ada-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.ada-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;padding:9px 4px;
  text-align:center;color:var(--text2);transition:all .2s;box-shadow:var(--sh);}
.ada-btn .em{display:block;font-size:1.1rem;margin-bottom:2px;}
.ada-btn:hover{border-color:var(--blue);color:var(--blue);}
.ada-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;
  box-shadow:0 3px 10px rgba(0,104,181,.3);}

/* KONTROL */
.ctrl{display:flex;margin:8px 16px 0;gap:5px;}
.cb{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;
  padding:8px 4px;color:var(--text2);transition:all .2s;box-shadow:var(--sh);}
.cb.a-blue{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,104,181,.28);}
.cb.a-hic{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.cb.a-paz{background:var(--pink-bg);border-color:var(--pink-border);color:var(--pink);}

/* VIEW TOGGLE */
.vtgl{display:flex;margin:8px 16px 0;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:3px;box-shadow:var(--sh);}
.vb{flex:1;border:none;border-radius:9px;cursor:pointer;font-size:.7rem;font-weight:600;
  padding:7px;background:transparent;color:var(--muted);transition:all .2s;}
.vb.active{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:var(--sh);}

/* PILLS */
.fscroll{overflow-x:auto;padding:8px 16px 3px;scrollbar-width:none;}
.fscroll::-webkit-scrollbar{display:none;}
.fpills{display:flex;gap:5px;width:max-content;}
.pill{padding:5px 12px;border:1px solid var(--border);border-radius:100px;font-size:.7rem;
  font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);
  white-space:nowrap;transition:all .2s;box-shadow:var(--sh);}
.pill.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700;}

/* NEXT */
.nxt{margin:8px 16px 0;background:var(--surface);border:1px solid var(--blue-border);
  border-radius:14px;padding:11px 14px;display:none;box-shadow:var(--sh);}
.nxt.show{display:block;}
.nxt-lbl{font-size:.59rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--blue);font-weight:700;margin-bottom:6px;}
.nxt-body{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.nxt-route{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;color:var(--text);}
.nxt-skt{font-size:.62rem;color:var(--muted);margin-top:2px;}
.nxt-dep{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;color:var(--blue);}
.nxt-arr{font-size:.66rem;color:var(--muted);}
.cd{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:8px;
  padding:4px 10px;font-size:.77rem;font-weight:700;color:var(--blue);min-width:52px;text-align:center;}

/* TIMELINE */
.tl-wrap{display:none;padding:8px 0 90px;}
.tl-wrap.show{display:block;}
.tl-sticky{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);}
.tl-axis-row{display:flex;}
.tl-spacer{width:var(--label-w);flex-shrink:0;background:var(--bg);}
.tl-ascroll{overflow-x:auto;flex:1;scrollbar-width:none;}
.tl-ascroll::-webkit-scrollbar{display:none;}
.tl-ainner{position:relative;height:26px;}
.tl-tick{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);}
.tl-tick-lbl{font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;color:var(--muted);padding:3px 0 2px;}
.tl-tick-line{width:1px;height:5px;background:var(--border);}
.tl-row{display:flex;align-items:center;border-bottom:1px solid var(--border);}
.tl-rlbl{width:var(--label-w);flex-shrink:0;padding:0 6px 0 16px;height:var(--row-h);
  display:flex;flex-direction:column;justify-content:center;}
.tl-rname{font-family:'Syne',sans-serif;font-size:.63rem;font-weight:700;line-height:1.2;}
.tl-rskt{font-size:.52rem;color:var(--muted);margin-top:1px;}
.tl-rscroll{flex:1;overflow-x:auto;scrollbar-width:none;}
.tl-rscroll::-webkit-scrollbar{display:none;}
.tl-rinner{position:relative;height:var(--row-h);}
.tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:5;}
.tl-di{width:10px;height:10px;border-radius:50%;border:2.5px solid currentColor;
  background:var(--surface);transition:all .15s;}
.tl-dot:hover .tl-di,.tl-dot.act .tl-di{width:14px;height:14px;background:currentColor;}
.tl-dot.passed .tl-di{opacity:.2;}
.tl-dot.is-next .tl-di{width:13px;height:13px;background:currentColor;
  animation:pulse 1.7s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,104,181,.4)}60%{box-shadow:0 0 0 7px rgba(0,104,181,0)}}
.tl-now{position:absolute;top:0;width:2px;background:rgba(180,30,30,.65);z-index:10;pointer-events:none;}
.tl-now::before{content:'';position:absolute;top:-4px;left:-4px;width:10px;height:10px;border-radius:50%;background:var(--red);}
.tl-gline{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;}
.tl-tt{position:fixed;z-index:100;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;min-width:178px;max-width:236px;
  box-shadow:var(--sh2);pointer-events:none;opacity:0;transition:opacity .15s;}
.tl-tt.show{opacity:1;}
.tt-dep{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--blue);}
.tt-lbl{font-size:.6rem;color:var(--muted);margin-top:1px;}
.tt-arr{font-size:.8rem;font-weight:600;color:var(--text);margin-top:5px;}
.tt-route{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;margin-top:4px;}
.tt-skt{font-size:.62rem;color:var(--muted);}
.tt-cd{margin-top:7px;font-size:.7rem;font-weight:700;color:var(--blue);
  background:var(--blue-bg);border-radius:6px;padding:3px 8px;display:inline-block;}
.tt-passed{margin-top:7px;font-size:.7rem;color:var(--muted);}
.tt-note{margin-top:6px;font-size:.58rem;color:var(--muted);line-height:1.45;
  border-top:1px solid var(--border);padding-top:5px;}

/* LIST */
.list-wrap{display:none;padding:8px 16px 90px;}
.list-wrap.show{display:block;}
.ig{margin-bottom:16px;animation:up .3s ease both;}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ig-head{display:flex;align-items:center;gap:7px;margin-bottom:7px;
  padding-bottom:7px;border-bottom:1px solid var(--border);}
.ig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ig-name{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--text);}
.ig-tags{display:flex;gap:4px;margin-left:auto;}
.tag{font-size:.57rem;font-weight:700;padding:2px 7px;border-radius:100px;border:1px solid;white-space:nowrap;}
.tag-sh{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border);}
.tag-mm{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border);}
.tag-pr{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border);}
.note-txt{font-size:.59rem;color:var(--text2);margin-bottom:7px;padding:5px 9px;
  background:var(--surface2);border-radius:7px;border-left:3px solid var(--border2);line-height:1.5;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:5px;}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:7px 5px;text-align:center;position:relative;transition:all .15s;box-shadow:var(--sh);}
.tc.is-next{border-color:var(--blue);background:var(--blue-bg);}
.tc.is-next::after{content:'▶';position:absolute;top:3px;right:4px;font-size:.42rem;color:var(--blue);}
.tc.passed{opacity:.25;box-shadow:none;}
.tc-dep{font-family:'Syne',sans-serif;font-size:.97rem;font-weight:700;line-height:1.1;color:var(--text);}
.tc-lbl{font-size:.49rem;color:var(--muted);margin-top:1px;}
.tc-arr{font-size:.62rem;color:var(--text2);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty span{font-size:1.8rem;display:block;margin-bottom:8px;}

/* BOTTOM */
.bot{position:fixed;bottom:0;left:0;right:0;padding:8px 16px 12px;
  background:linear-gradient(to top,var(--bg) 70%,transparent);text-align:center;pointer-events:none;}
.bot p{font-size:.58rem;color:var(--muted);}
</style>
</head>
<body>

<div class="hdr">
  <span class="ferry">⛴️</span>
  <div>
    <h1>Adalar Vapur Seferleri</h1>
    <p>2025–2026 Kış Tarifesi</p>
  </div>
  <div class="src-pill">Şehir Hatları · Mavi Marmara · Prenstur · Güncellendi: 01.04.2026 07:43</div>
</div>

<div class="clk">
  <div class="clk-time" id="clock">--:--</div>
  <div>
    <div class="clk-date" id="cdate"></div>
    <div class="badge hic" id="dbadge"></div>
  </div>
</div>

<div class="ada-wrap">
  <div class="lbl">Ada seç</div>
  <div class="ada-grid">
    <button class="ada-btn active" id="ada-Büyükada" onclick="setAda('Büyükada')"><span class="em">🏝️</span>Büyükada</button>
    <button class="ada-btn" id="ada-Heybeliada" onclick="setAda('Heybeliada')"><span class="em">⛪</span>Heybeliada</button>
    <button class="ada-btn" id="ada-Burgazada" onclick="setAda('Burgazada')"><span class="em">🌲</span>Burgazada</button>
    <button class="ada-btn" id="ada-Kınalıada" onclick="setAda('Kınalıada')"><span class="em">🪨</span>Kınalıada</button>
  </div>
</div>

<div class="ctrl">
  <button class="cb a-blue" id="btn-gidis" onclick="setDir('gidis')">🚢 Gidiş</button>
  <button class="cb" id="btn-donus" onclick="setDir('donus')">↩️ Dönüş</button>
  <button class="cb a-hic" id="btn-hic" onclick="setDayType('hic')">📅 H.İçi/Cmt</button>
  <button class="cb" id="btn-pazar" onclick="setDayType('pazar')">🌞 Pazar/Tatil</button>
</div>

<div class="vtgl">
  <button class="vb" id="vb-tl" onclick="setView('tl')">📊 Zaman Çizelgesi</button>
  <button class="vb active" id="vb-list" onclick="setView('list')">☰ Liste</button>
</div>

<div class="fscroll"><div class="fpills" id="pills"></div></div>

<div class="nxt" id="nxt">
  <div class="nxt-lbl">⚡ Bir Sonraki Sefer</div>
  <div class="nxt-body">
    <div><div class="nxt-route" id="nxt-route">—</div><div class="nxt-skt" id="nxt-skt"></div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div><div class="nxt-dep" id="nxt-dep">--:--</div><div class="nxt-arr" id="nxt-arr"></div></div>
      <div class="cd" id="nxt-cd">—</div>
    </div>
  </div>
</div>

<div class="tl-wrap" id="tl-wrap">
  <div class="tl-sticky">
    <div class="tl-axis-row">
      <div class="tl-spacer"></div>
      <div class="tl-ascroll" id="tl-ascroll"><div class="tl-ainner" id="tl-ainner"></div></div>
    </div>
  </div>
  <div id="tl-body"></div>
</div>
<div class="list-wrap show" id="list-wrap"></div>
<div class="tl-tt" id="tt"></div>

te":"","hic":[],"pazar":[]},{"iskele":"Beşiktaş","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Bostancı","sirket":"Şehir Hatları","note":"Ring hat","hic":[],"pazar":[]},{"iskele":"Maltepe","sirket":"Şehir Hatları","note":"★ işaretli seferler Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]},{"iskele":"Bostancı","sirket":"Mavi Marmara","note":"★ işaretli sefer Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]}],"donus":[{"iskele":"Burgazada → Kabataş","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Burgazada → Kadıköy","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Burgazada → Beşiktaş","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Burgazada → Kadıköy","sirket":"Şehir Hatları","note":"Beşiktaş hattı üzerinden","hic":[],"pazar":[]},{"iskele":"Burgazada → Bostancı","sirket":"Şehir Hatları","note":"Ring hat","hic":[],"pazar":[]},{"iskele":"Burgazada → Maltepe","sirket":"Şehir Hatları","note":"★ işaretli seferler Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]},{"iskele":"Burgazada → Bostancı","sirket":"Mavi Marmara","note":"★ işaretli sefer Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]}]},"Kınalıada":{"gidis":[{"iskele":"Kabataş","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Kadıköy","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Beşiktaş","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Bostancı","sirket":"Şehir Hatları","note":"Ring hat","hic":[],"pazar":[]},{"iskele":"Maltepe","sirket":"Şehir Hatları","note":"★ işaretli seferler Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]},{"iskele":"Bostancı","sirket":"Mavi Marmara","note":"★ işaretli sefer Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]}],"donus":[{"iskele":"Kınalıada → Kabataş","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Kınalıada → Kadıköy","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Kınalıada → Beşiktaş","sirket":"Şehir Hatları","note":"","hic":[],"pazar":[]},{"iskele":"Kınalıada → Kadıköy","sirket":"Şehir Hatları","note":"Beşiktaş hattı üzerinden","hic":[],"pazar":[]},{"iskele":"Kınalıada → Bostancı","sirket":"Şehir Hatları","note":"Ring hat","hic":[],"pazar":[]},{"iskele":"Kınalıada → Maltepe","sirket":"Şehir Hatları","note":"★ işaretli seferler Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]},{"iskele":"Kınalıada → Bostancı","sirket":"Mavi Marmara","note":"★ işaretli sefer Pazar ve Resmi Tatil günleri yapılmaz","hic":[],"pazar":[]}]}};

// utils
const toMin=t=>{if(!t)return-1;const c=t.replace(/[★*]/g,'').trim();if(!c||c==='—')return-1;const[h,m]=c.split(':').map(Number);return isNaN(h)?-1:h*60+m;};
const adj=m=>(m>=0&&m<240)?m+1440:m;
const now=()=>{const n=new Date();return n.getHours()*60+n.getMinutes();};
const clean=s=>(s||'').replace(/[★*]/g,'');
const isPaz=()=>new Date().getDay()===0;
const cd=dep=>{const d=adj(dep)-now();if(d<0)return null;if(d===0)return'Şimdi!';if(d<60)return`${d}dk`;const h=Math.floor(d/60),mn=d%60;return mn?`${h}s ${mn}dk`:`${h}s`;};
const color=g=>g.sirket==='Mavi Marmara'?'var(--purple)':g.sirket==='Prenstur'?'var(--orange)':'var(--blue)';
const tagCls=g=>g.sirket==='Mavi Marmara'?'tag-mm':g.sirket==='Prenstur'?'tag-pr':'tag-sh';
const shortI=g=>{const n=g.iskele;if(n.includes(' → ')){const p=n.split(' → ');return p[p.length-1];}return n;};

// state
let ada='Büyükada',dir='gidis',dt='hic',filt='Tümü',view='list',adot=null;
const PX=2.6,TLW=24*60*PX,px=m=>m*PX;

function renderClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  const days=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('cdate').textContent=`${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
  const b=document.getElementById('dbadge');
  if(isPaz()){b.textContent='Bugün Pazar / Tatil';b.className='badge paz';}
  else{b.textContent='Bugün Hafta İçi / Cumartesi';b.className='badge hic';}
}

function setAda(a){ada=a;filt='Tümü';document.querySelectorAll('.ada-btn').forEach(b=>b.classList.remove('active'));const btn=document.getElementById('ada-'+a);if(btn)btn.classList.add('active');renderPills();render();}
function setDir(d){dir=d;filt='Tümü';document.getElementById('btn-gidis').className='cb'+(d==='gidis'?' a-blue':'');document.getElementById('btn-donus').className='cb'+(d==='donus'?' a-blue':'');renderPills();render();}
function setDayType(t){dt=t;document.getElementById('btn-hic').className='cb'+(t==='hic'?' a-hic':'');document.getElementById('btn-pazar').className='cb'+(t==='pazar'?' a-paz':'');render();}
function setView(v){view=v;document.getElementById('vb-tl').className='vb'+(v==='tl'?' active':'');document.getElementById('vb-list').className='vb'+(v==='list'?' active':'');document.getElementById('tl-wrap').className='tl-wrap'+(v==='tl'?' show':'');document.getElementById('list-wrap').className='list-wrap'+(v==='list'?' show':'');render();}

function renderPills(){const el=document.getElementById('pills');el.innerHTML='';const gs=(D[ada]||{})[dir]||[];const labs=['Tümü',...new Set(gs.map(shortI))];labs.forEach(k=>{const b=document.createElement('button');b.className='pill'+(k===filt?' active':'');b.textContent=k;b.onclick=()=>{filt=k;renderPills();render();};el.appendChild(b);});}

function getActive(){let gs=(D[ada]||{})[dir]||[];if(filt!=='Tümü')gs=gs.filter(g=>shortI(g)===filt);return gs.map(g=>({...g,trips:(dt==='hic'?g.hic:g.pazar)||[]})).filter(g=>g.trips.length>0);}

function updateNext(active){const n=now();let gnxt=null,gG=null;active.forEach(g=>g.trips.forEach(t=>{const d=toMin(t.dep);if(d<0)return;const a=adj(d);if(a>=n&&(!gnxt||a<adj(toMin(gnxt.dep)))){gnxt=t;gG=g;}}));const el=document.getElementById('nxt');if(gnxt){el.classList.add('show');document.getElementById('nxt-route').textContent=gG.iskele;document.getElementById('nxt-skt').textContent=gG.sirket;document.getElementById('nxt-dep').textContent=clean(gnxt.dep);document.getElementById('nxt-arr').textContent=gnxt.arr?`Varış: ${gnxt.arr}`:'';document.getElementById('nxt-cd').textContent=cd(toMin(gnxt.dep))||'✓';}else el.classList.remove('show');return{gnxt,gG};}

function renderList(active,gnxt,gG){const el=document.getElementById('list-wrap');el.innerHTML='';if(!active.length){el.innerHTML='<div class="empty"><span>🌊</span>Bu gün ve filtre için sefer bulunamadı.</div>';return;}const n=now();active.forEach((g,gi)=>{const div=document.createElement('div');div.className='ig';div.style.animationDelay=`${gi*.04}s`;const clr=color(g);div.innerHTML=`<div class="ig-head"><div class="ig-dot" style="background:${clr}"></div><div class="ig-name">${g.iskele}</div><div class="ig-tags"><span class="tag ${tagCls(g)}">${g.sirket}</span></div></div>${g.note?`<div class="note-txt">${g.note}</div>`:''}<div class="tgrid" id="tg${gi}"></div>`;el.appendChild(div);const grid=div.querySelector(`#tg${gi}`);g.trips.forEach(t=>{const d=toMin(t.dep),a=d>=0?adj(d):-1;const passed=a>=0&&a<n,isNext=gnxt===t&&gG===g;const card=document.createElement('div');card.className='tc'+(passed?' passed':'')+(isNext?' is-next':'');card.innerHTML=`<div class="tc-dep">${clean(t.dep)}</div>${t.arr?`<div class="tc-lbl">varış</div><div class="tc-arr">${t.arr}</div>`:`<div style="font-size:.44rem;color:var(--muted);margin-top:2px">—</div>`}`;grid.appendChild(card);});});}

function renderTimeline(active,gnxt,gG){const ax=document.getElementById('tl-ainner'),body=document.getElementById('tl-body');ax.style.width=TLW+'px';ax.innerHTML='';body.innerHTML='';for(let h=0;h<=24;h++){const tk=document.createElement('div');tk.className='tl-tick';tk.style.left=px(h*60)+'px';tk.innerHTML=`<span class="tl-tick-lbl">${String(h%24).padStart(2,'0')}:00</span><div class="tl-tick-line"></div>`;ax.appendChild(tk);}const n=now();active.forEach((g,gi)=>{const row=document.createElement('div');row.className='tl-row';const lbl=document.createElement('div');lbl.className='tl-rlbl';const ln=g.iskele.replace(`${ada} → `,'').replace(` → ${ada}`,'');const clr=color(g);lbl.innerHTML=`<div class="tl-rname" style="color:${clr}">${ln}</div><div class="tl-rskt">${g.sirket}</div>`;row.appendChild(lbl);const scr=document.createElement('div');scr.className='tl-rscroll';const inn=document.createElement('div');inn.className='tl-rinner';inn.style.width=TLW+'px';for(let h=0;h<=24;h++){const gl=document.createElement('div');gl.className='tl-gline';gl.style.left=px(h*60)+'px';inn.appendChild(gl);}if(gi===0){const nl=document.createElement('div');nl.className='tl-now';nl.style.left=px(n)+'px';nl.style.height=(active.length*44)+'px';nl.style.position='absolute';inn.appendChild(nl);}g.trips.forEach(t=>{const d=toMin(t.dep);if(d<0)return;const passed=adj(d)<n,isNext=gnxt===t&&gG===g;const dot=document.createElement('div');dot.className='tl-dot'+(passed?' passed':'')+(isNext?' is-next':'');dot.style.left=px(d)+'px';dot.style.color=clr;const di=document.createElement('div');di.className='tl-di';dot.appendChild(di);dot.addEventListener('click',e=>{e.stopPropagation();showTT(dot,t,g,passed,isNext);});inn.appendChild(dot);});scr.appendChild(inn);row.appendChild(scr);body.appendChild(row);});syncTL();}

function syncTL(){const ax=document.getElementById('tl-ascroll');if(!ax)return;const tgt=Math.max(0,px(now())-80);ax.scrollLeft=tgt;document.querySelectorAll('.tl-rscroll').forEach(r=>r.scrollLeft=tgt);if(!ax._s){ax._s=true;ax.addEventListener('scroll',()=>{document.querySelectorAll('.tl-rscroll').forEach(r=>{if(r.scrollLeft!==ax.scrollLeft)r.scrollLeft=ax.scrollLeft;});});document.querySelectorAll('.tl-rscroll').forEach(r=>{r.addEventListener('scroll',()=>{ax.scrollLeft=r.scrollLeft;document.querySelectorAll('.tl-rscroll').forEach(o=>{if(o!==r&&o.scrollLeft!==r.scrollLeft)o.scrollLeft=r.scrollLeft;});});});}}

function showTT(dot,t,g,passed,isNext){const tt=document.getElementById('tt');if(adot===dot){tt.classList.remove('show');adot=null;dot.classList.remove('act');return;}if(adot)adot.classList.remove('act');adot=dot;dot.classList.add('act');const dep=clean(t.dep),c2=passed?null:cd(toMin(t.dep));const clr=color(g);tt.innerHTML=`<div class="tt-dep">${dep}</div><div class="tt-lbl">kalkış</div>${t.arr?`<div class="tt-arr">→ Varış: <strong>${t.arr}</strong></div>`:''}<div class="tt-route" style="color:${clr}">${g.iskele}</div><div class="tt-skt">${g.sirket}</div>${passed?'<div class="tt-passed">⏪ Sefer geçti</div>':c2?`<div class="tt-cd">⚡ ${c2}</div>`:''}${g.note?`<div class="tt-note">${g.note}</div>`:''}`;const rect=dot.getBoundingClientRect(),tw=200;let tx=rect.left+rect.width/2-tw/2,ty=rect.top-170;if(tx<8)tx=8;if(tx+tw>window.innerWidth-8)tx=window.innerWidth-tw-8;if(ty<8)ty=rect.bottom+12;tt.style.left=tx+'px';tt.style.top=ty+'px';tt.classList.add('show');}
document.addEventListener('click',()=>{document.getElementById('tt').classList.remove('show');if(adot){adot.classList.remove('act');adot=null;}});

function render(){const active=getActive();const{gnxt,gG}=updateNext(active);if(view==='tl')renderTimeline(active,gnxt,gG);else renderList(active,gnxt,gG);}

if(isPaz()){dt='pazar';document.getElementById('btn-hic').className='cb';document.getElementById('btn-pazar').className='cb a-paz';}
renderClock();
setInterval(()=>{renderClock();render();},30000);
renderPills();render();
</script>
